<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ANVAMED Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-shell">

  <header class="header">
    <div class="brand-title">ANVAMED</div>
    <div class="brand-subtitle">MANAGER</div>
  </header>

  <main class="main-content">

    <!-- HOME -->
    <section id="homePage" class="page active">

      <div class="top-cards">
        <div class="card stat-card">
          <p>Mese in corso</p>
          <h2 id="meseCorrenteTotale">€0.00</h2>
        </div>
        <div class="card stat-card green">
          <p>Totale struttura</p>
          <h2 id="meseCorrenteStruttura">€0.00</h2>
        </div>
        <div class="card stat-card purple">
          <p>Totale medici</p>
          <h2 id="meseCorrenteMedici">€0.00</h2>
        </div>
      </div>

      <button class="main-btn" id="newRegistrationBtn">
        <span class="btn-plus">＋</span>
        <span class="btn-text-wrap">
          <span class="btn-title">NUOVA REGISTRAZIONE</span>
          <span class="btn-subtitle">Giorno corrente o giorni passati</span>
        </span>
      </button>

      <div id="homeWorkedDoctors" class="cards-list"></div>

    </section>

    <!-- MEDICI -->
    <section id="mediciPage" class="page">

      <div class="page-head">
        <h2>Medici</h2>
        <button class="small-action-btn" id="addDoctorBtn">+ Nuovo</button>
      </div>

      <!-- BACKUP / IMPORT -->
      <div style="display:flex; gap:10px; margin-bottom:14px;">
        <button class="small-action-btn" onclick="exportData()">💾 Backup</button>
        <label class="small-action-btn" style="cursor:pointer;">
          📂 Importa
          <input type="file" id="importFile" hidden />
        </label>
      </div>

      <div id="doctorsSimpleList" class="simple-list"></div>

    </section>

    <!-- DETTAGLIO MEDICO -->
    <section id="doctorDetailPage" class="page">

      <div class="page-head">
        <button class="back-btn" id="backToDoctorsBtn">←</button>
        <h2 id="doctorDetailName">Medico</h2>
      </div>

      <div id="doctorAvailability" class="giorni"></div>

      <div class="filter-control">
        <label>Mese</label>
        <input id="doctorDetailMonth" type="month">
      </div>

      <div style="display:flex; gap:10px; margin:10px 0;">
        <button class="small-action-btn" id="quickAddDoctorBtn">+ Prestazione</button>
        <button class="small-action-btn" id="printDoctorBtn">🖨️ Stampa</button>
      </div>

      <div class="stats">
        <div class="card stats-card">
          <span>Medico</span>
          <strong id="doctorTotMedico">€0</strong>
        </div>
        <div class="card stats-card">
          <span>Struttura</span>
          <strong id="doctorTotStruttura">€0</strong>
        </div>
        <div class="card stats-card">
          <span>Prestazioni</span>
          <strong id="doctorTotPrestazioni">0</strong>
        </div>
      </div>

      <div id="doctorMonthPrestazioni" class="cards-list"></div>

    </section>

    <!-- REPORT -->
    <section id="reportPage" class="page">

      <div class="page-head">
        <h2>Report</h2>
        <button class="small-action-btn" id="printReportBtn">🖨️</button>
      </div>

      <div class="period-tabs">
        <button id="reportTabGiorno" class="tab active">Giorno</button>
        <button id="reportTabMese" class="tab">Mese</button>
        <button id="reportTabAnno" class="tab">Anno</button>
      </div>

      <div id="reportFilterControlWrap"></div>

      <div id="reportPieWrap"></div>
      <div id="reportCards" class="report-grid"></div>

    </section>

    <!-- FATTURE -->
    <section id="fatturePage" class="page">

      <div class="page-head">
        <h2>Fatture</h2>
        <button class="small-action-btn" id="printInvoicesBtn">🖨️</button>
      </div>

      <div class="fatture-filters">
        <input type="date" id="fattureDateFrom">
        <input type="date" id="fattureDateTo">
        <select id="fattureStatusFilter">
          <option value="tutti">Tutti</option>
          <option value="da_fatturare">Da fatturare</option>
          <option value="fatturato">Fatturato</option>
          <option value="pagato">Pagato</option>
        </select>
      </div>

      <div id="fattureSummary"></div>
      <div id="fattureList" class="fatture-grid"></div>

    </section>

    <!-- CALENDARIO -->
    <section id="calendarPage" class="page">

      <div class="page-head">
        <button class="back-btn" id="backToHomeBtn">←</button>
        <h2>Calendario</h2>
      </div>

      <input type="month" id="calendarMonth">

      <div id="calendarGrid" class="calendar-grid"></div>

    </section>

  </main>

  <!-- MENU -->
  <footer class="menu">
    <button class="menu-btn active" data-page="homePage">🏠</button>
    <button class="menu-btn" data-page="mediciPage">👨‍⚕️</button>
    <button class="menu-btn" data-page="reportPage">📊</button>
    <button class="menu-btn" data-page="fatturePage">🧾</button>
  </footer>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">

    <div class="popup-head">
      <h2 id="popupTitle">Nuova Registrazione</h2>
      <button id="closePopupBtn">✕</button>
    </div>

    <select id="popupDoctorSelect"></select>
    <input id="popupPrestazione" placeholder="Prestazione">
    <input id="popupData" type="date">
    <input id="popupImporto" type="number" placeholder="Importo">

    <div class="perc">
      <input id="popupPercMedico" type="number" value="60">
      <input id="popupPercStruttura" type="number" value="40">
    </div>

    <div class="actions">
      <button id="cancelPopupBtn">Annulla</button>
      <button id="savePopupBtn">Salva</button>
    </div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
