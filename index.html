<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>ANVAMED</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="brand">
        <div class="brand-title">ANVAMED</div>
        <div class="brand-subtitle">Manager</div>
      </div>
    </header>

    <main class="main-content">
      <!-- HOME -->
      <section id="home" class="page active">
        <div class="top-cards">
          <div class="card stat-card">
            <p>Mese</p>
            <h2 id="mese">€0.00</h2>
          </div>

          <div class="card stat-card green">
            <p>Struttura</p>
            <h2 id="struttura">€0.00</h2>
          </div>

          <div class="card stat-card purple">
            <p>Medici</p>
            <h2 id="medici">€0.00</h2>
          </div>
        </div>

        <button class="main-btn" type="button" onclick="openPopup()">
          <span class="btn-plus">＋</span>
          <span class="btn-text-wrap">
            <span class="btn-title">NUOVA REGISTRAZIONE</span>
            <span class="btn-subtitle">Aggiungi subito una prestazione</span>
          </span>
        </button>

        <div class="totali">
          <div class="card total-card">
            <p>Guadagno</p>
            <h2 id="guadagno">€0.00</h2>
          </div>

          <div class="card total-card">
            <p>Utile</p>
            <h2 id="utile" class="utile">€0.00</h2>
          </div>
        </div>

        <div id="homeMedici" class="cards-list"></div>
      </section>

      <!-- MEDICI -->
      <section id="mediciPage" class="page">
        <div class="page-head">
          <h2>Medici</h2>
          <button class="small-action-btn" type="button" onclick="addMedico()">
            + Nuovo
          </button>
        </div>

        <div id="mediciList" class="cards-list"></div>
      </section>

      <!-- DETTAGLIO -->
      <section id="dettaglio" class="page">
        <div class="page-head">
          <button class="back-btn" type="button" onclick="go('mediciPage')">←</button>
          <h2 id="nome">Medico</h2>
        </div>

        <div id="giorni" class="giorni"></div>

        <div class="stats">
          <div class="card stats-card">
            <span class="stats-label">Medico</span>
            <strong id="totM">0.00</strong>
          </div>
          <div class="card stats-card">
            <span class="stats-label">Struttura</span>
            <strong id="totS">0.00</strong>
          </div>
          <div class="card stats-card">
            <span class="stats-label">Prestazioni</span>
            <strong id="count">0</strong>
          </div>
        </div>

        <div id="prestazioni" class="cards-list"></div>
      </section>

      <!-- REPORT -->
      <section id="reportPage" class="page">
        <div class="page-head">
          <h2>Report</h2>
        </div>
        <div id="report" class="cards-list"></div>
      </section>

      <!-- FATTURE -->
      <section id="fatturePage" class="page">
        <div class="page-head">
          <h2>Fatture</h2>
        </div>
        <div id="fattureList" class="cards-list"></div>
      </section>
    </main>

    <footer class="menu">
      <button class="menu-btn active" type="button" onclick="go('home', this)">
        <span class="menu-icon">🏠</span>
        <span class="menu-label">Home</span>
      </button>
      <button class="menu-btn" type="button" onclick="go('mediciPage', this)">
        <span class="menu-icon">👨‍⚕️</span>
        <span class="menu-label">Medici</span>
      </button>
      <button class="menu-btn" type="button" onclick="go('reportPage', this)">
        <span class="menu-icon">📊</span>
        <span class="menu-label">Report</span>
      </button>
      <button class="menu-btn" type="button" onclick="go('fatturePage', this)">
        <span class="menu-icon">🧾</span>
        <span class="menu-label">Fatture</span>
      </button>
    </footer>
  </div>

  <!-- POPUP -->
  <div id="popup" class="popup hidden">
    <div class="popup-box">
      <div class="popup-head">
        <h2>Nuova Registrazione</h2>
        <button class="close-btn" type="button" onclick="closePopup()">✕</button>
      </div>

      <select id="medico"></select>

      <input id="prestazione" type="text" placeholder="Prestazione" />
      <input id="data" type="date" />
      <input id="importo" type="number" step="0.01" placeholder="Importo" />

      <div class="perc">
        <div class="perc-group">
          <label for="percM">% Medico</label>
          <input id="percM" type="number" min="0" max="100" value="60" />
        </div>
        <div class="perc-group">
          <label for="percS">% Struttura</label>
          <input id="percS" type="number" min="0" max="100" value="40" />
        </div>
      </div>

      <div class="actions">
        <button class="secondary-btn" type="button" onclick="closePopup()">Annulla</button>
        <button class="primary-btn" type="button" onclick="salva()">Salva</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
